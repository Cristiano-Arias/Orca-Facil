<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Orça Fácil · Orçamentos e propostas pelo WhatsApp</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#f4f6fb;
    --surface:#ffffff;
    --tinta:#0f172a;        /* slate-900 */
    --tinta-suave:#64748b;  /* slate-500 */
    --marca:#4f46e5;        /* indigo-600 */
    --marca-esc:#4338ca;
    --marca-clara:#eef2ff;
    --verde:#10b981;        /* emerald */
    --verde-esc:#059669;
    --vermelho:#e11d48;
    --ambar:#f59e0b;
    --azul:#0ea5e9;
    --borda:#e6e9f2;
    --borda-forte:#d4d9e6;
    --sombra:0 1px 2px rgba(15,23,42,.05),0 8px 24px rgba(15,23,42,.06);
    --raio:14px;
    --zap:#25d366;
    --zap-bg:#e5ddd5;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--tinta);-webkit-font-smoothing:antialiased;font-size:15px}
  h1,h2,h3,.display{font-family:'Fraunces',Georgia,serif;font-weight:600;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:15px}
  a{color:inherit}

  /* Layout */
  .app{display:flex;min-height:100vh}
  .sidebar{width:236px;flex-shrink:0;background:linear-gradient(180deg,#1e1b4b,#312e81);color:#e0e7ff;padding:22px 16px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 20px}
  .brand .mark{width:34px;height:34px;border-radius:9px;background:var(--marca);display:grid;place-items:center;font-family:'Fraunces',serif;font-weight:700;color:#fff;font-size:20px;box-shadow:0 4px 12px rgba(79,70,229,.5)}
  .brand .logo{font-family:'Fraunces',serif;font-size:21px;font-weight:600;color:#fff;line-height:1}
  .brand .tag{font-size:10.5px;color:#a5b4fc;letter-spacing:.08em;text-transform:uppercase}
  .nav-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:10px;color:#c7d2fe;font-weight:500;font-size:14.5px;border:none;background:transparent;width:100%;text-align:left;transition:background .15s,color .15s}
  .nav-item svg{width:19px;height:19px;flex-shrink:0;opacity:.9}
  .nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
  .nav-item.ativo{background:var(--marca);color:#fff}
  .nav-item .badge{margin-left:auto;background:rgba(255,255,255,.18);color:#fff;border-radius:999px;font-size:11px;padding:1px 7px;font-weight:600}
  .sidebar .rodape{margin-top:auto;font-size:11px;color:#a5b4fc;padding:8px;line-height:1.6}
  .sidebar .rodape b{color:#e0e7ff}

  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;gap:14px;padding:18px 28px;background:var(--bg);border-bottom:1px solid var(--borda);position:sticky;top:0;z-index:20;flex-wrap:wrap}
  .topbar h2{margin:0;font-size:22px}
  .topbar .sub{color:var(--tinta-suave);font-size:13px;margin-top:2px}
  .topbar .espaco{flex:1}
  .conteudo{padding:24px 28px 90px;max-width:1180px;width:100%}

  /* Componentes */
  .btn{border:none;border-radius:10px;padding:10px 16px;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:7px;transition:transform .05s,filter .15s}
  .btn:active{transform:translateY(1px)}
  .btn-primario{background:var(--marca);color:#fff}
  .btn-primario:hover{filter:brightness(1.07)}
  .btn-zap{background:var(--zap);color:#063}
  .btn-zap:hover{filter:brightness(1.05)}
  .btn-sec{background:var(--surface);color:var(--tinta);border:1px solid var(--borda-forte)}
  .btn-sec:hover{background:var(--bg)}
  .btn-fantasma{background:transparent;color:var(--tinta-suave);padding:7px 10px}
  .btn-fantasma:hover{color:var(--tinta);background:var(--bg)}
  .btn-perigo{background:transparent;color:var(--vermelho);border:1px solid #f3c6cf}
  .btn-perigo:hover{background:#fdecef}
  .btn svg{width:16px;height:16px}
  .btn-sm{padding:6px 10px;font-size:13px}

  .card{background:var(--surface);border:1px solid var(--borda);border-radius:var(--raio);box-shadow:var(--sombra)}
  .grid{display:grid;gap:16px}

  .kpis{grid-template-columns:repeat(auto-fit,minmax(170px,1fr));margin-bottom:18px}
  .kpi{padding:16px 18px}
  .kpi .rotulo{font-size:12.5px;color:var(--tinta-suave);font-weight:500;display:flex;align-items:center;gap:6px}
  .kpi .valor{font-family:'Fraunces',serif;font-size:26px;font-weight:600;margin-top:7px;line-height:1}
  .kpi .nota{font-size:12px;color:var(--tinta-suave);margin-top:6px}
  .kpi .valor.pos{color:var(--verde-esc)} .kpi .valor.neg{color:var(--vermelho)}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:600}

  .tabela-wrap{overflow-x:auto;border-radius:var(--raio)}
  table{width:100%;border-collapse:collapse;font-size:14px;background:var(--surface)}
  thead th{text-align:left;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--tinta-suave);padding:12px 14px;border-bottom:1px solid var(--borda);white-space:nowrap}
  tbody td{padding:12px 14px;border-bottom:1px solid var(--bg);vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#fafbff}
  .num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .acoes-cel{display:flex;gap:4px;justify-content:flex-end}
  .clicavel{cursor:pointer}

  .secao-titulo{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--tinta-suave);font-weight:600;margin:26px 0 12px}

  /* Status */
  .st{padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:600;white-space:nowrap}
  .st-RASCUNHO{background:#eef0f5;color:#64748b}
  .st-AGUARDANDO{background:#fef3c7;color:#92660a}
  .st-ENVIADA{background:#dbeafe;color:#1d4ed8}
  .st-VISUALIZADA{background:#e0e7ff;color:#4338ca}
  .st-NEGOCIACAO{background:#fce7f3;color:#9d174d}
  .st-APROVADA{background:#d1fae5;color:#047857}
  .st-RECUSADA{background:#fee2e2;color:#b91c1c}
  .st-VENCIDA{background:#f3e8d6;color:#92660a}
  .st-CANCELADA{background:#f1f5f9;color:#94a3b8}
  .st-CONVERTIDA{background:#cffafe;color:#0e7490}
  .st-PAGA_PARCIAL{background:#ede9fe;color:#6d28d9}
  .st-PAGA{background:#d1fae5;color:#047857}

  /* WhatsApp */
  .zap-wrap{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:20px;align-items:start}
  @media(max-width:980px){.zap-wrap{grid-template-columns:1fr}}
  .zap-phone{background:var(--surface);border:1px solid var(--borda);border-radius:18px;box-shadow:var(--sombra);overflow:hidden;display:flex;flex-direction:column;height:calc(100vh - 150px);min-height:520px}
  .zap-top{background:#075e54;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:11px}
  .zap-top .av{width:38px;height:38px;border-radius:50%;background:#25d366;display:grid;place-items:center;font-weight:700;color:#063;font-family:'Fraunces',serif}
  .zap-top .nome{font-weight:600;font-size:15px;line-height:1.2}
  .zap-top .stt{font-size:11.5px;color:#bdf0e0}
  .zap-body{flex:1;overflow-y:auto;padding:16px;background:#e5ddd5;background-image:linear-gradient(rgba(229,221,213,.4),rgba(229,221,213,.4));display:flex;flex-direction:column;gap:8px}
  .msg{max-width:82%;padding:8px 11px;border-radius:9px;font-size:14px;line-height:1.45;box-shadow:0 1px 1px rgba(0,0,0,.08);white-space:pre-wrap;word-wrap:break-word}
  .msg .hora{display:block;text-align:right;font-size:10px;color:#667;margin-top:2px}
  .msg.bot{background:#fff;align-self:flex-start;border-top-left-radius:2px}
  .msg.eu{background:#dcf8c6;align-self:flex-end;border-top-right-radius:2px}
  .msg.sis{align-self:center;background:#fff4d6;color:#7a5b12;font-size:12px;border-radius:8px;text-align:center;box-shadow:none}
  .msg b{font-weight:700}
  .zap-input{display:flex;gap:8px;padding:10px;background:#f0f0f0;border-top:1px solid var(--borda)}
  .zap-input input{flex:1;border:1px solid var(--borda-forte);border-radius:22px;padding:10px 15px;outline:none;background:#fff}
  .zap-input button{border:none;background:var(--zap);color:#063;width:42px;height:42px;border-radius:50%;display:grid;place-items:center;font-size:18px}
  .quick{display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px;background:#f0f0f0;border-top:1px solid var(--borda)}
  .quick button{background:#fff;border:1px solid var(--borda-forte);border-radius:999px;padding:5px 11px;font-size:12.5px;color:var(--marca);font-weight:600}
  .quick button:hover{background:var(--marca-clara)}
  .lateral h3{margin:0 0 4px;font-size:16px}
  .dica{padding:14px 16px;font-size:13px;color:var(--tinta-suave);line-height:1.6}
  .dica code{background:var(--bg);padding:2px 6px;border-radius:6px;font-size:12px;color:var(--marca-esc);font-family:ui-monospace,monospace}
  .ex-msg{display:block;width:100%;text-align:left;background:var(--bg);border:1px solid var(--borda);border-radius:10px;padding:10px 12px;margin-bottom:7px;font-size:13px;color:var(--tinta);line-height:1.4}
  .ex-msg:hover{border-color:var(--marca);background:var(--marca-clara)}

  /* Forms / modal */
  .ov{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;z-index:50;overflow-y:auto}
  .modal{background:var(--surface);border-radius:16px;box-shadow:0 20px 60px rgba(15,23,42,.3);width:100%;max-width:560px;padding:24px}
  .modal.lg{max-width:820px}
  .modal h3{margin:0 0 4px;font-size:20px}
  .modal .desc{color:var(--tinta-suave);font-size:13.5px;margin-bottom:18px}
  .campo{margin-bottom:14px}
  .campo label{display:block;font-size:13px;font-weight:600;margin-bottom:5px;color:var(--tinta)}
  .campo input,.campo select,.campo textarea{width:100%;border:1px solid var(--borda-forte);border-radius:10px;padding:10px 12px;outline:none;background:var(--surface)}
  .campo input:focus,.campo select:focus,.campo textarea:focus{border-color:var(--marca);box-shadow:0 0 0 3px var(--marca-clara)}
  .linha2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .modal-acoes{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--tinta);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:500;z-index:99;box-shadow:0 10px 30px rgba(0,0,0,.25)}
  .toast.erro{background:var(--vermelho)}

  .vazio{text-align:center;padding:50px 20px;color:var(--tinta-suave)}
  .vazio svg{width:46px;height:46px;opacity:.4;margin-bottom:10px}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .chip{background:var(--surface);border:1px solid var(--borda-forte);border-radius:999px;padding:6px 13px;font-size:13px;font-weight:600;color:var(--tinta-suave)}
  .chip.ativo{background:var(--marca);color:#fff;border-color:var(--marca)}

  /* Proposta / PDF */
  .doc{background:#fff;color:#1a2230;max-width:720px;margin:0 auto;padding:0;border-radius:12px;overflow:hidden;box-shadow:var(--sombra)}
  .doc-head{display:flex;justify-content:space-between;align-items:flex-start;padding:26px 30px;background:linear-gradient(120deg,var(--marca),#6366f1);color:#fff}
  .doc-logo{width:56px;height:56px;border-radius:12px;background:rgba(255,255,255,.18);display:grid;place-items:center;font-family:'Fraunces',serif;font-weight:700;font-size:24px;overflow:hidden}
  .doc-logo img{width:100%;height:100%;object-fit:cover}
  .doc-prof b{font-size:18px;font-family:'Fraunces',serif}
  .doc-prof div{font-size:12.5px;opacity:.92;margin-top:1px}
  .doc-num{text-align:right;font-size:12.5px;opacity:.95}
  .doc-num .big{font-size:15px;font-weight:700;font-family:'Fraunces',serif}
  .doc-body{padding:26px 30px}
  .doc-sec{margin-bottom:20px}
  .doc-sec .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;font-weight:700;margin-bottom:6px}
  .doc-cli{font-size:15px;font-weight:600}
  .doc-table{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:4px}
  .doc-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;padding:8px 6px;border-bottom:2px solid #eef0f5}
  .doc-table td{padding:9px 6px;border-bottom:1px solid #f1f3f8}
  .doc-table .num{text-align:right}
  .doc-tot{margin-top:14px;margin-left:auto;width:260px}
  .doc-tot .ln{display:flex;justify-content:space-between;padding:5px 0;font-size:13.5px}
  .doc-tot .ln.total{border-top:2px solid #1a2230;margin-top:6px;padding-top:9px;font-size:17px;font-weight:700;font-family:'Fraunces',serif}
  .doc-cond{display:grid;grid-template-columns:1fr 1fr;gap:14px 24px}
  .doc-cond .it .k{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;font-weight:700}
  .doc-cond .it .v{font-size:14px;margin-top:2px}
  .doc-fotos{display:flex;gap:8px;flex-wrap:wrap}
  .doc-fotos .ph{width:88px;height:66px;border-radius:8px;background:#eef0f5;display:grid;place-items:center;color:#b7c0d0;font-size:11px;border:1px dashed #d4d9e6}
  .doc-foot{padding:18px 30px;background:#f7f8fc;border-top:1px solid #eef0f5;font-size:12px;color:#64748b;text-align:center}
  .aprovar-bar{display:flex;gap:10px;justify-content:center;padding:18px;background:#0f172a;color:#fff}

  @media print{
    body{background:#fff}
    .sidebar,.topbar,.no-print,.modal-acoes,.aprovar-bar{display:none!important}
    .ov{position:static;background:none;padding:0;display:block}
    .modal{box-shadow:none;max-width:none;padding:0}
    .doc{box-shadow:none;max-width:none}
    .conteudo{padding:0}
  }

  .logo-up{display:flex;align-items:center;gap:14px}
  .logo-preview{width:64px;height:64px;border-radius:12px;background:var(--marca-clara);display:grid;place-items:center;overflow:hidden;border:1px solid var(--borda)}
  .logo-preview img{width:100%;height:100%;object-fit:cover}
  .logo-preview span{font-family:'Fraunces',serif;font-weight:700;color:var(--marca);font-size:24px}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="mark">O</div>
      <div>
        <div class="logo">Orça Fácil</div>
        <div class="tag">Orçamentos pelo WhatsApp</div>
      </div>
    </div>
    <button class="nav-item" data-v="zap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>Assistente</button>
    <button class="nav-item" data-v="painel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M18 17V9M13 17V5M8 17v-3"/></svg>Painel</button>
    <button class="nav-item" data-v="propostas"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h4"/></svg>Propostas<span class="badge" id="bd-prop">0</span></button>
    <button class="nav-item" data-v="clientes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>Clientes</button>
    <button class="nav-item" data-v="servicos"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>Serviços</button>
    <button class="nav-item" data-v="perfil"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Meu perfil</button>
    <div class="rodape">
      <b>Orça Fácil</b> — protótipo<br/>
      Dados salvos neste navegador.<br/>
      <button onclick="resetarDemo()" style="color:#a5b4fc;background:none;border:none;text-decoration:underline;padding:4px 0;cursor:pointer">Recarregar exemplo</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h2 id="tb-titulo">Assistente</h2>
        <div class="sub" id="tb-sub">Converse como no WhatsApp para criar orçamentos</div>
      </div>
      <div class="espaco"></div>
      <div id="tb-acoes"></div>
    </div>
    <div class="conteudo" id="conteudo"></div>
  </main>
</div>

<div id="modal-root"></div>
<div id="toast-root"></div>

<script>
/* ============================================================
   Orça Fácil — protótipo funcional (single-file)
   Demonstra: assistente WhatsApp -> orçamento, cadastro
   automático de cliente/serviço, proposta/PDF, página do
   cliente, painel e controle financeiro.
   Persistência: localStorage.
   ============================================================ */
const STORE_KEY = 'orcafacil_v1';
let db = null;
let view = 'zap';
let chartRefs = [];

/* ---------- util ---------- */
function uid(){ return 'id'+Math.random().toString(36).slice(2,9); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function brl(n){ return (n||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function brlc(n){ return (n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function hoje(){ const t=new Date(); return new Date(t.getFullYear(),t.getMonth(),t.getDate()); }
function ymd(dt){ return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'); }
function brDate(str){ if(!str) return '—'; const p=str.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function addDias(dt,n){ const x=new Date(dt); x.setDate(x.getDate()+n); return x; }
function mesAtualYM(){ const h=hoje(); return h.getFullYear()+'-'+String(h.getMonth()+1).padStart(2,'0'); }
function agoraHora(){ const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function num2(n){ return Math.round((n||0)*100)/100; }

function salvar(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(db)); }catch(e){} }
function carregar(){
  try{ const s=localStorage.getItem(STORE_KEY); if(s){ db=JSON.parse(s); return; } }catch(e){}
  db = dadosExemplo();
  salvar();
}

function toast(msg, erro){
  const r=document.getElementById('toast-root');
  r.innerHTML='<div class="toast '+(erro?'erro':'')+'">'+esc(msg)+'</div>';
  setTimeout(()=>{ r.innerHTML=''; }, 2600);
}
function fecharModal(){ document.getElementById('modal-root').innerHTML=''; }
function abrirModal(html, lg){
  document.getElementById('modal-root').innerHTML='<div class="ov" id="ov"><div class="modal '+(lg?'lg':'')+'">'+html+'</div></div>';
  document.getElementById('ov').addEventListener('mousedown',e=>{ if(e.target.id==='ov') fecharModal(); });
}

/* ---------- helpers de domínio ---------- */
function cliente(id){ return db.clientes.find(c=>c.id===id); }
function clienteNome(id){ const c=cliente(id); return c?c.nome:'—'; }
function totalProposta(p){
  const bruto = (p.itens||[]).reduce((s,i)=>s+ (i.qtd||0)*(i.preco||0), 0);
  const desc = p.desconto||0;
  return num2(bruto - desc);
}
function custoProposta(p){ return num2((p.itens||[]).reduce((s,i)=>s+(i.qtd||0)*(i.custo||0),0) + (p.custos||0)); }
function recebidoProposta(p){ return num2((p.pagamentos||[]).reduce((s,x)=>s+(x.valor||0),0)); }
function margemProposta(p){ const t=totalProposta(p); const c=custoProposta(p); if(!t) return 0; return (t-c)/t*100; }
function novoNumero(){ db._seq=(db._seq||2000)+1; return 'ORC-'+db._seq; }
function proximoStatus(p){
  // vencimento automático
  if(['ENVIADA','VISUALIZADA','NEGOCIACAO','AGUARDANDO'].includes(p.status) && p.emitidoEm){
    const venc = addDias(new Date(p.emitidoEm), p.validadeDias||7);
    if(hoje()>venc) return 'VENCIDA';
  }
  return p.status;
}

/* ============================================================
   INTERPRETADOR (NLP heurístico em PT-BR)
   ============================================================ */
function normaliza(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function parseMoeda(s){
  // "R$ 2.240,00" / "2240" / "28,50" / "R$28"
  const m = s.match(/r?\$?\s*([\d\.]+(?:,\d{1,2})?)/i);
  if(!m) return null;
  return parseFloat(m[1].replace(/\./g,'').replace(',','.'));
}
function extrairCampos(texto){
  const t=texto; const n=normaliza(texto);
  const out={};
  // cliente: "para João", "cliente Maria", "para a dona Ana", "do João", "da Maria"
  let m = t.match(/(?:para|pra|pro|cliente|sr\.?|sra\.?|dona|seu)\s+(?:o |a |dona |sr\.? |sra\.? )?([A-ZÀ-Ú][\wÀ-ú]+(?:\s+[A-ZÀ-Ú][\wÀ-ú]+){0,2})/);
  if(m) out.cliente = m[1].trim();
  // telefone
  m = t.match(/(\(?\d{2}\)?\s?\d{4,5}-?\d{4})/); if(m) out.telefone=m[1];
  // quantidade + unidade
  m = n.match(/(\d+(?:[.,]\d+)?)\s*(m2|m²|metros?\s*quadrados?|metros?|un|unidades?|pe[çc]as?|tomadas?|janelas?|portas?|luminarias?|ar-?condicionados?|splits?|horas?|dias?\b|serv)/);
  if(m){ out.qtd=parseFloat(m[1].replace(',','.')); out.unidade=normUnidade(m[2]); }
  // "2 ar-condicionados" sem unidade explícita já cai acima
  // preço unitário: "R$ 28 por metro", "R$ 650 cada", "28 por m2"
  m = t.match(/r?\$?\s*([\d\.]+(?:,\d{1,2})?)\s*(?:reais\s*)?(?:\/|por\b|cada\b|o metro|a unidade)/i);
  if(m) out.preco = parseFloat(m[1].replace(/\./g,'').replace(',','.'));
  // total: "total R$ 480", "valor total 2240"
  m = t.match(/(?:valor total|total|fica em|fica por|sai por)\D{0,6}r?\$?\s*([\d\.]+(?:,\d{1,2})?)/i);
  if(m) out.total = parseFloat(m[1].replace(/\./g,'').replace(',','.'));
  // prazo
  m = n.match(/prazo\s*(?:de\s*)?(\d+\s*(?:dias?|semanas?|meses?|horas?))/); if(m) out.prazo=m[1];
  else if(/\bamanha\b/.test(n)) out.prazo='1 dia (amanhã)';
  else if(/\bhoje\b/.test(n)) out.prazo='hoje';
  else { m=n.match(/(?:execu[çc][aã]o|entrega)\s*(?:em|de|:)?\s*(\d+\s*dias?)/); if(m) out.prazo=m[1]; }
  // pagamento
  if(/pix/.test(n)) out.pagamento='Pix';
  m = t.match(/(\d{1,3}%\s*(?:de\s*)?entrada[^,.;]*)/i); if(m) out.pagamento=m[1].trim();
  else if(/a\s*vista|à\s*vista/.test(n)) out.pagamento=(out.pagamento?out.pagamento+' à vista':'À vista');
  else if(/parcel/.test(n)){ const mm=t.match(/(\d+)\s*x/); out.pagamento='Parcelado'+(mm?' em '+mm[1]+'x':''); }
  else if(/cart[aã]o/.test(n)) out.pagamento=(out.pagamento||'Cartão');
  else if(/boleto/.test(n)) out.pagamento=(out.pagamento||'Boleto');
  // garantia
  m = n.match(/garantia\s*(?:de\s*)?(\d+\s*(?:dias?|meses?|anos?|ano))/); if(m) out.garantia=m[1];
  // validade
  m = n.match(/validade\s*(?:de\s*)?(\d+)\s*dias?/); if(m) out.validadeDias=parseInt(m[1]);
  // desconto
  m = n.match(/desconto\s*(?:de\s*)?(\d+)\s*%/); if(m) out.descontoPct=parseInt(m[1]);
  // serviço: tenta casar com catálogo, senão palavras-chave conhecidas
  out.servico = detectarServico(t);
  return out;
}
function normUnidade(u){
  u=normaliza(u);
  if(/m2|m²|metro/.test(u)) return 'm²';
  if(/hora/.test(u)) return 'h';
  if(/dia/.test(u)) return 'diária';
  return 'un';
}
const SERVICOS_CHAVE=[
  ['pintura','Pintura de apartamento','m²'],
  ['ar-?condicionado|split|climatiza','Instalação de ar-condicionado split','un'],
  ['tomada','Troca de tomadas','un'],
  ['luminaria|lâmpada|lampada|spot','Instalação de luminária','un'],
  ['eletric|elétric|fia[çc][aã]o','Serviço elétrico','serviço'],
  ['hidraul|encanamento|vazamento|cano','Reparo hidráulico','serviço'],
  ['gesso|drywall|forro','Instalação de gesso','m²'],
  ['piso|porcelanato|azulejo','Assentamento de piso','m²'],
  ['marcenaria|movel|armario','Marcenaria','serviço'],
  ['limpeza','Limpeza','serviço'],
  ['jardin|poda|grama','Jardinagem','serviço'],
  ['conserto|reparo|manuten','Manutenção geral','serviço'],
];
function detectarServico(t){
  const n=normaliza(t);
  // primeiro tenta serviços já cadastrados
  for(const s of db.servicos){ const k=normaliza(s.nome).split(' ')[0]; if(k.length>3 && n.includes(k)) return {nome:s.nome, unidade:s.unidade, preco:s.precoPadrao, custo:s.custoPadrao, garantia:s.garantiaPadrao}; }
  for(const [rx,nome,uni] of SERVICOS_CHAVE){ if(new RegExp(rx).test(n)){
    const cad=db.servicos.find(s=>normaliza(s.nome)===normaliza(nome));
    return {nome, unidade:uni, preco:cad?cad.precoPadrao:null, custo:cad?cad.custoPadrao:null, garantia:cad?cad.garantiaPadrao:''};
  }}
  return null;
}

/* ============================================================
   ROTEADOR DE INTENÇÃO + MÁQUINA DE CONVERSA
   ============================================================ */
function processarMensagem(texto){
  const n=normaliza(texto);
  const conv=db.conversa;

  // se estamos aguardando confirmação de envio/aprovação etc.
  if(conv.etapa==='confirmando' && conv.rascunho){
    return tratarConfirmacao(texto,n);
  }
  if(conv.etapa==='coletando' && conv.rascunho){
    return coletarCampo(texto,n);
  }

  // intenções diretas
  if(/\bquanto (vendi|faturei|recebi)\b|vendas do mes|faturamento/.test(n)) return respVendasMes();
  if(/pendente|aguardando|em aberto/.test(n) && /proposta|orcamento/.test(n)) return respPendentes();
  if(/(recebi|registrar pagamento|pagamento de|pagou|pagamento)\b/.test(n) && parseMoeda(texto)!=null && !/orcamento|orçamento|proposta para/.test(n)) return registrarPagamentoTexto(texto,n);
  if(/anexar foto|^📎|enviei? (uma )?foto|mandei foto/.test(n)) return respFoto();
  if(/🎤|audio|áudio/.test(n)) return respAudio();
  if(/duplicar|igual ao ultimo|mesma proposta|criar.*igual/.test(n)) return duplicarUltima();
  if(/ajuda|como funciona|o que voce faz/.test(n)) return botDiz('Posso criar orçamentos, cadastrar clientes e serviços sozinho, gerar PDF, mandar pro cliente e controlar pagamentos.\n\nÉ só mandar algo como:\n_"Orçamento para Ana, troca de 6 tomadas, R$ 45 cada, garantia 90 dias"_');

  // começar orçamento (com ou sem dados)
  const campos=extrairCampos(texto);
  const querOrcar = /\b(orcamento|orçamento|proposta|orcar|fazer|criar|novo)\b/.test(n) || campos.servico || campos.cliente;
  if(querOrcar){ return iniciarOrcamento(texto, campos); }

  botDiz('Não entendi 🤔. Tente algo como:\n_"Fazer orçamento para João, pintura, 80 m², R$ 28 por metro"_\n\nOu toque num exemplo ao lado.');
}

function iniciarOrcamento(texto, campos){
  const r = {
    clienteNomeTexto: campos.cliente||null, telefone:campos.telefone||null,
    servico: campos.servico ? campos.servico.nome : null,
    unidade: campos.unidade || (campos.servico&&campos.servico.unidade) || 'un',
    qtd: campos.qtd || null,
    preco: campos.preco || (campos.servico&&campos.servico.preco) || null,
    custo: (campos.servico&&campos.servico.custo) || null,
    total: campos.total || null,
    prazo: campos.prazo||'', pagamento:campos.pagamento||'',
    garantia: campos.garantia || (campos.servico&&campos.servico.garantia) || '',
    validadeDias: campos.validadeDias || db.prof.validadePadrao || 7,
    descontoPct: campos.descontoPct||0,
  };
  // se só tem total e qtd, deriva preço
  if(!r.preco && r.total && r.qtd) r.preco = num2(r.total/r.qtd);
  if(!r.qtd && r.total && r.preco) r.qtd = num2(r.total/r.preco);
  if(!r.qtd && r.preco && r.total) {} // nada
  db.conversa.rascunho=r;

  // o que falta?
  const falta=[];
  if(!r.servico) falta.push('servico');
  if(!r.clienteNomeTexto) falta.push('cliente');
  if(!r.qtd && !r.total) falta.push('qtd');
  if(!r.preco && !r.total) falta.push('preco');
  if(!r.prazo) falta.push('prazo');
  if(!r.pagamento) falta.push('pagamento');

  // mensagem de reconhecimento
  let recon='Entendi! 📝 Comecei um orçamento';
  if(r.clienteNomeTexto) recon+=' para *'+r.clienteNomeTexto+'*';
  if(r.servico) recon+=' — *'+r.servico+'*';
  recon+='.';
  botDiz(recon);

  if(falta.length===0){ return mostrarResumo(); }

  db.conversa.pergFila=falta;
  db.conversa.etapa='coletando';
  perguntarProximo();
}

  prazo:'Qual o *prazo de execução*? (ex: 5 dias)',
  pagamento:'Qual a *forma de pagamento*? (ex: Pix, 50% entrada e 50% na entrega)',
};
function perguntarProximo(){
  const fila=db.conversa.pergFila;
  if(!fila.length){ db.conversa.etapa='resumo'; return mostrarResumo(); }
  const faltam=fila.length;
  let intro = faltam>1 ? 'Para finalizar, preciso de mais '+faltam+' informação'+(faltam>1?'ções':'')+'. ' : '';
  botDiz(intro+PERGUNTAS[fila[0]]);
}
function coletarCampo(texto,n){
  const r=db.conversa.rascunho;
  const campo=db.conversa.pergFila[0];
  const c=extrairCampos(texto);
  if(campo==='servico'){ if(c.servico){ r.servico=c.servico.nome; r.unidade=c.servico.unidade; if(!r.preco)r.preco=c.servico.preco; if(r.custo==null)r.custo=c.servico.custo; if(!r.garantia)r.garantia=c.servico.garantia; } else { r.servico=texto.trim(); } }
  else if(campo==='cliente'){ r.clienteNomeTexto = (c.cliente||texto.trim()); if(c.telefone) r.telefone=c.telefone; }
  else if(campo==='qtd'){ if(c.qtd){ r.qtd=c.qtd; if(c.unidade)r.unidade=c.unidade; } else { const num=parseFloat(texto.replace(',','.')); if(!isNaN(num)) r.qtd=num; } if(c.total)r.total=c.total; }
  else if(campo==='preco'){ if(c.preco)r.preco=c.preco; else if(c.total){r.total=c.total;} else { const v=parseMoeda(texto); if(v!=null)r.preco=v; }
    if(!r.preco && r.total && r.qtd) r.preco=num2(r.total/r.qtd);
    if(!r.qtd && r.total && r.preco) r.qtd=num2(r.total/r.preco);
  }
  else if(campo==='prazo'){ r.prazo = c.prazo || texto.trim(); }
  else if(campo==='pagamento'){ r.pagamento = c.pagamento || texto.trim(); }
  // também aproveita campos extras que vierem na resposta
  if(c.garantia && !r.garantia) r.garantia=c.garantia;
  if(c.prazo && !r.prazo) r.prazo=c.prazo;
  if(c.pagamento && !r.pagamento) r.pagamento=c.pagamento;

  db.conversa.pergFila.shift();
  // remove da fila qualquer campo que já tenha sido preenchido
  db.conversa.pergFila = db.conversa.pergFila.filter(f=>{
    if(f==='qtd') return !(r.qtd||r.total);
    if(f==='preco') return !(r.preco||r.total);
    if(f==='prazo') return !r.prazo;
    if(f==='pagamento') return !r.pagamento;
    if(f==='servico') return !r.servico;
    if(f==='cliente') return !r.clienteNomeTexto;
    return true;
  });
  salvar();
  perguntarProximo();
}

function mostrarResumo(){
  const r=db.conversa.rascunho;
  if(!r.preco && r.total && r.qtd) r.preco=num2(r.total/r.qtd);
  if(!r.qtd) r.qtd = r.total&&r.preco ? num2(r.total/r.preco) : 1;
  const totalItem = num2(r.qtd*r.preco);
  const desc = r.descontoPct ? num2(totalItem*r.descontoPct/100) : 0;
  const total = num2(totalItem - desc);
  r.totalCalc=total;
  db.conversa.etapa='confirmando';
  let txt='✅ *Resumo da proposta*\n\n';
  txt+='Cliente: *'+(r.clienteNomeTexto||'—')+'*\n';
  txt+='Serviço: '+(r.servico||'—')+'\n';
  txt+='Quantidade: '+r.qtd+' '+(r.unidade||'')+'\n';
  txt+='Valor unitário: '+brl(r.preco)+'\n';
  if(desc) txt+='Desconto: '+r.descontoPct+'% (−'+brl(desc)+')\n';
  txt+='*Valor total: '+brl(total)+'*\n';
  txt+='Prazo: '+(r.prazo||'a combinar')+'\n';
  txt+='Pagamento: '+(r.pagamento||'a combinar')+'\n';
  if(r.garantia) txt+='Garantia: '+r.garantia+'\n';
  txt+='Validade: '+r.validadeDias+' dias\n';
  // alerta de margem
  if(r.custo){ const cTot=num2(r.qtd*r.custo); const mg=total? (total-cTot)/total*100:0; if(mg<15) txt+='\n⚠️ Margem estimada de apenas '+mg.toFixed(0)+'%. Quer revisar o valor?\n'; }
  txt+='\nO que deseja?\n*1* Gerar PDF / salvar\n*2* Salvar e enviar ao cliente\n*3* Adicionar item\n*4* Alterar valor\n*5* Cancelar';
  botDiz(txt);
}
function tratarConfirmacao(texto,n){
  const r=db.conversa.rascunho;
  if(/^5$|cancelar|deixa pra la|esquece/.test(n)){ db.conversa={etapa:'inicio',rascunho:null,pergFila:[]}; return botDiz('Ok, cancelei esse orçamento. 👍'); }
  if(/^3$|adicionar item|mais um item|outro item/.test(n)){
    db.conversa.etapa='additem';
    return botDiz('Certo! Descreva o *item adicional* (ex: "instalação de 2 luminárias, R$ 90 cada").');
  }
  if(/^4$|alterar valor|mudar valor|trocar valor|outro valor/.test(n)){
    db.conversa.etapa='altvalor';
    return botDiz('Qual o novo *valor unitário* ou *valor total*?');
  }
  if(/^1$|gerar|pdf|salvar|so salvar|rascunho/.test(n)){ return finalizarRascunho(false); }
  if(/^2$|enviar|manda|mandar|cliente/.test(n)){ return finalizarRascunho(true); }
  // captura adicional de campos
  return botDiz('Responda com *1*, *2*, *3*, *4* ou *5*. 🙂');
}

// estados extras: additem / altvalor
function processarExtras(texto,n){
  const conv=db.conversa, r=conv.rascunho;
  if(conv.etapa==='additem'){
    const c=extrairCampos(texto);
    r.itensExtra = r.itensExtra||[];
    r.itensExtra.push({desc:c.servico?c.servico.nome:texto.trim(), qtd:c.qtd||1, unidade:c.unidade||'un', preco:c.preco||c.total||0, custo:(c.servico&&c.servico.custo)||0});
    conv.etapa='confirmando';
    botDiz('Adicionei o item. 👌');
    return mostrarResumo();
  }
  if(conv.etapa==='altvalor'){
    const c=extrairCampos(texto); const v=c.preco||c.total||parseMoeda(texto);
    if(v!=null){ if(c.total){ r.preco=num2(c.total/(r.qtd||1)); } else { r.preco=v; } }
    conv.etapa='confirmando';
    botDiz('Valor atualizado. 💰');
    return mostrarResumo();
  }
  return false;
}

function finalizarRascunho(enviar){
  const r=db.conversa.rascunho;
  // cliente: achar ou criar
  let cli = acharCliente(r.clienteNomeTexto);
  let avisoCliente='';
  if(!cli){
    cli={id:uid(), nome:r.clienteNomeTexto||'Cliente sem nome', telefone:r.telefone||'', email:'', endereco:'', obs:'', criadoEm:ymd(hoje())};
    db.clientes.push(cli); avisoCliente='👤 Criei o cadastro do cliente *'+cli.nome+'*.\n';
  } else if(r.telefone && !cli.telefone){ cli.telefone=r.telefone; }
  // serviço: achar ou criar + histórico de preço
  let avisoServ='';
  if(r.servico){
    let sv=db.servicos.find(s=>normaliza(s.nome)===normaliza(r.servico));
    if(!sv){ sv={id:uid(), nome:r.servico, unidade:r.unidade||'un', precoPadrao:r.preco||0, custoPadrao:r.custo||0, garantiaPadrao:r.garantia||'', historico:[r.preco||0], criadoEm:ymd(hoje())}; db.servicos.push(sv); avisoServ='🧰 Cadastrei o serviço *'+sv.nome+'* (R$ '+brlc(r.preco||0)+'/'+sv.unidade+').\n'; }
    else { if(r.preco){ sv.historico.push(r.preco); sv.precoPadrao=r.preco; } if(r.garantia) sv.garantiaPadrao=r.garantia; }
  }
  // itens
  const itens=[{desc:r.servico||'Serviço', qtd:r.qtd||1, unidade:r.unidade||'un', preco:r.preco||0, custo:r.custo||0}];
  if(r.itensExtra) itens.push(...r.itensExtra);
  const desconto = r.descontoPct ? num2(itens.reduce((s,i)=>s+i.qtd*i.preco,0)*r.descontoPct/100) : 0;
  const p={
    id:uid(), numero:novoNumero(), clienteId:cli.id, servicoBase:r.servico||'Serviço',
    status: enviar?'ENVIADA':'RASCUNHO', criadoEm:ymd(hoje()), emitidoEm:ymd(hoje()),
    itens, desconto, custos:0, prazo:r.prazo||'', pagamento:r.pagamento||'',
    validadeDias:r.validadeDias||7, garantia:r.garantia||'', obs:'', fotos:r.fotos||0,
    historico:[{data:ymd(hoje()), evento: enviar?'Criada e enviada':'Criada como rascunho'}], pagamentos:[]
  };
  db.proposals.unshift(p);
  db.conversa={etapa:'inicio', rascunho:null, pergFila:[]};
  salvar();

  let msg=avisoCliente+avisoServ+'📄 Proposta *'+p.numero+'* criada — '+brl(totalProposta(p))+'.';
  if(enviar){
    msg+='\n\n📤 *Mensagem pronta para o cliente:*\n_"Olá, '+cli.nome+'. Segue a proposta referente ao serviço de '+(r.servico||'')+', com escopo, valores, prazo e condições. Qualquer dúvida, fico à disposição."_\n\n🔗 Link: orcafacil.app/p/'+p.numero.toLowerCase();
  }
  msg+='\n\nToque em *Ver propostas* no topo para abrir, gerar o PDF e ver a página do cliente.';
  botDiz(msg);
  toast('Proposta '+p.numero+' criada');
  document.getElementById('bd-prop').textContent = db.proposals.length;
}

function acharCliente(nomeTexto){
  if(!nomeTexto) return null;
  const n=normaliza(nomeTexto);
  const exatos=db.clientes.filter(c=>normaliza(c.nome)===n);
  if(exatos.length===1) return exatos[0];
  // por primeiro nome
  const prim=n.split(' ')[0];
  const cand=db.clientes.filter(c=>normaliza(c.nome).split(' ')[0]===prim);
  if(cand.length===1) return cand[0];
  return null;
}

/* intenções financeiras e consultas */
function registrarPagamentoTexto(texto,n){
  const valor=parseMoeda(texto);
  // cliente
  let m=texto.match(/d[aeo]\s+([A-ZÀ-Ú][\wÀ-ú]+(?:\s+[A-ZÀ-Ú][\wÀ-ú]+)?)/);
  let nomeCli = m?m[1]:null;
  let cli = nomeCli?acharCliente(nomeCli):null;
  let forma = /pix/.test(n)?'Pix':(/cart[aã]o/.test(n)?'Cartão':(/dinheiro/.test(n)?'Dinheiro':'—'));
  // propostas em aberto desse cliente
  let abertas = db.proposals.filter(p=>{
    if(cli && p.clienteId!==cli.id) return false;
    return ['APROVADA','ENVIADA','VISUALIZADA','NEGOCIACAO','PAGA_PARCIAL','CONVERTIDA'].includes(p.status) && recebidoProposta(p)<totalProposta(p);
  });
  if(abertas.length===0){ return botDiz('Não encontrei proposta em aberto'+(cli?' do(a) '+cli.nome:'')+' para registrar '+brl(valor)+'. Pode me dizer de qual cliente é?'); }
  if(abertas.length>1){
    db.conversa={etapa:'inicio',rascunho:null,pergFila:[]};
    let txt='Encontrei mais de uma proposta em aberto'+(cli?' da '+cli.nome:'')+'. Esse pagamento de '+brl(valor)+' é referente a qual?\n';
    abertas.slice(0,4).forEach((p,i)=>txt+='\n*'+(i+1)+'* '+p.numero+' — '+p.servicoBase+' ('+brl(totalProposta(p))+')');
    botDiz(txt); return;
  }
  const p=abertas[0];
  p.pagamentos.push({data:ymd(hoje()), valor, forma});
  const rec=recebidoProposta(p), tot=totalProposta(p);
  p.status = rec>=tot ? 'PAGA' : 'PAGA_PARCIAL';
  p.historico.push({data:ymd(hoje()), evento:'Pagamento de '+brl(valor)+' ('+forma+')'});
  salvar();
  botDiz('💰 Registrei *'+brl(valor)+'* ('+forma+') na proposta *'+p.numero+'* — '+cliente(p.clienteId).nome+'.\nRecebido: '+brl(rec)+' de '+brl(tot)+(rec>=tot?' ✅ *Quitada!*':' — falta '+brl(tot-rec)+'.'));
  toast('Pagamento registrado');
}

function duplicarUltima(){
  if(!db.proposals.length) return botDiz('Você ainda não tem propostas para duplicar.');

  p.pagamentos=[]; p.historico=[{data:ymd(hoje()),evento:'Duplicada de '+base.numero}];

}

// intercepta estados extras antes do roteador padrão
const _proc=processarMensagem;
processarMensagem=function(texto){

function viewPainel(c){
  const ym=mesAtualYM();

  const recebido=all.reduce((s,p)=>s+recebidoProposta(p),0);

  const enviadas=all.filter(p=>p.status!=='RASCUNHO').length;

  const etapas=['Criadas','Enviadas','Aprovadas','Pagas'];
  const fv=[all.length, all.filter(p=>p.status!=='RASCUNHO').length, aprovadas.length, all.filter(p=>p.status==='PAGA').length];
  chartRefs.push(new Chart(document.getElementById('ch4'),{type:'bar',data:{labels:etapas,datasets:[{data:fv,backgroundColor:['#c7d2fe','#a5b4fc','#818cf8','#4f46e5'],borderRadius:8}]},options:{maintainAspectRatio:false,plugins:{legend:{display:false}}}}));
}

/* ============================================================
   VIEW: PROPOSTAS
   ============================================================ */
let filtroProp='TODAS';
function viewPropostas(c){
  const filtros=[['TODAS','Todas'],['RASCUNHO','Rascunhos'],['ENVIADA','Enviadas'],['APROVADA','Aprovadas'],['PAGA','Pagas'],['RECUSADA','Recusadas']];
  let lista=db.proposals.slice();
  if(filtroProp!=='TODAS') lista=lista.filter(p=>proximoStatus(p)===filtroProp || (filtroProp==='PAGA'&&p.status==='PAGA_PARCIAL'));
  let html=`<div class="chips">${filtros.map(([k,l])=>`<button class="chip ${filtroProp===k?'ativo':''}" onclick="filtroProp='${k}';render()">${l}</button>`).join('')}</div>`;
  if(!lista.length){ html+=`<div class="card vazio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg><div>Nenhuma proposta aqui. Crie pelo <b>Assistente</b>.</div></div>`; c.innerHTML=html; return; }
  html+=`<div class="card tabela-wrap"><table><thead><tr><th>Nº</th><th>Cliente</th><th>Serviço</th><th class="num">Total</th><th class="num">Recebido</th><th>Status</th><th></th></tr></thead><tbody>`;
  lista.forEach(p=>{
    const rec=recebidoProposta(p), tot=totalProposta(p);
    html+=`<tr class="clicavel" onclick="abrirProposta('${p.id}')">
      <td><b>${esc(p.numero)}</b><div style="font-size:12px;color:var(--tinta-suave)">${brDate(p.emitidoEm)}</div></td>
      <td>${esc(cliente(p.clienteId)?.nome||'—')}</td>
      <td>${esc(p.servicoBase)}</td>
      <td class="num">${brl(tot)}</td>
      <td class="num">${rec?brl(rec):'—'}</td>
      <td>${stPill(proximoStatus(p))}</td>
      <td class="acoes-cel" onclick="event.stopPropagation()"><button class="btn btn-sec btn-sm" onclick="abrirProposta('${p.id}')">Abrir</button></td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;
  c.innerHTML=html;
}

function abrirProposta(id){
  const p=db.proposals.find(x=>x.id===id); if(!p) return;
  abrirModal(htmlDocProposta(p,false)+`
    <div class="modal-acoes no-print">
      <button class="btn btn-fantasma" onclick="fecharModal()">Fechar</button>
      <button class="btn btn-sec" onclick="mudarStatus('${p.id}')">Mudar status</button>
      <button class="btn btn-sec" onclick="paginaCliente('${p.id}')">👁 Página do cliente</button>
      <button class="btn btn-sec" onclick="window.print()">⬇ Gerar PDF</button>
      <button class="btn btn-zap" onclick="enviarCliente('${p.id}')">Enviar ao cliente</button>
    </div>`, true);
}

function htmlDocProposta(p, publico){
  const cli=cliente(p.clienteId)||{};
  const pf=db.prof;
  const bruto=(p.itens||[]).reduce((s,i)=>s+i.qtd*i.preco,0);
  const total=totalProposta(p);
  const venc=p.emitidoEm? brDate(ymd(addDias(new Date(p.emitidoEm), p.validadeDias||7))) : '—';
  const logo = pf.logo ? `<img src="${pf.logo}"/>` : `<span style="font-size:24px">${esc(pf.logoTexto||'O')}</span>`;
  let itens=(p.itens||[]).map(i=>`<tr><td>${esc(i.desc)}</td><td class="num">${i.qtd} ${esc(i.unidade||'')}</td><td class="num">${brl(i.preco)}</td><td class="num">${brl(i.qtd*i.preco)}</td></tr>`).join('');
  return `<div class="doc" id="doc-print">
    <div class="doc-head">
      <div style="display:flex;gap:14px;align-items:center">
        <div class="doc-logo">${logo}</div>
        <div class="doc-prof"><b>${esc(pf.nome||'Profissional')}</b>
          <div>${esc(pf.responsavel||'')}</div>
          <div>${esc(pf.telefone||'')} ${pf.email?'· '+esc(pf.email):''}</div>
          ${pf.documento?'<div>'+esc(pf.documento)+'</div>':''}
        </div>
      </div>
      <div class="doc-num"><div>PROPOSTA</div><div class="big">${esc(p.numero)}</div><div>Emissão: ${brDate(p.emitidoEm)}</div><div>Validade: ${venc}</div></div>
    </div>
    <div class="doc-body">
      <div class="doc-sec"><div class="lbl">Cliente</div><div class="doc-cli">${esc(cli.nome||'—')}</div>
        <div style="font-size:13px;color:#64748b">${esc(cli.telefone||'')} ${cli.endereco?' · '+esc(cli.endereco):''}</div></div>
      <div class="doc-sec"><div class="lbl">Escopo / itens</div>
        <table class="doc-table"><thead><tr><th>Descrição</th><th class="num">Qtd</th><th class="num">Unitário</th><th class="num">Total</th></tr></thead><tbody>${itens}</tbody></table>
        <div class="doc-tot">
          <div class="ln"><span>Subtotal</span><span>${brl(bruto)}</span></div>
          ${p.desconto?`<div class="ln"><span>Desconto</span><span>− ${brl(p.desconto)}</span></div>`:''}
          <div class="ln total"><span>Total</span><span>${brl(total)}</span></div>
        </div>
      </div>
      <div class="doc-sec"><div class="lbl">Condições</div>
        <div class="doc-cond">
          <div class="it"><div class="k">Prazo de execução</div><div class="v">${esc(p.prazo||'a combinar')}</div></div>
          <div class="it"><div class="k">Pagamento</div><div class="v">${esc(p.pagamento||'a combinar')}</div></div>
          <div class="it"><div class="k">Garantia</div><div class="v">${esc(p.garantia||'—')}</div></div>
          <div class="it"><div class="k">Validade</div><div class="v">${p.validadeDias} dias (até ${venc})</div></div>
        </div>
      </div>
      ${p.fotos?`<div class="doc-sec"><div class="lbl">Imagens de referência</div><div class="doc-fotos">${Array.from({length:Math.min(p.fotos,4)}).map(()=>'<div class="ph">📷 foto</div>').join('')}</div></div>`:''}
      ${p.obs?`<div class="doc-sec"><div class="lbl">Observações</div><div style="font-size:13.5px">${esc(p.obs)}</div></div>`:''}
    </div>
    <div class="doc-foot">${esc(pf.nome||'')} · ${esc(pf.telefone||'')} ${pf.pix?'· Pix: '+esc(pf.pix):''} — Proposta gerada pelo Orça Fácil</div>
  </div>`;
}

function mudarStatus(id){
  const p=db.proposals.find(x=>x.id===id); if(!p) return;
  const ops=['RASCUNHO','ENVIADA','VISUALIZADA','NEGOCIACAO','APROVADA','RECUSADA','CONVERTIDA','PAGA_PARCIAL','PAGA','CANCELADA'];
  abrirModal('<h3>Mudar status</h3><div class="desc">'+esc(p.numero)+' — '+esc(cliente(p.clienteId).nome)+'</div><div class="campo"><label>Status</label><select id="ms">'+ops.map(s=>'<option value="'+s+'" '+(p.status===s?'selected':'')+'>'+ST_LABEL[s]+'</option>').join('')+'</select></div><div class="modal-acoes"><button class="btn btn-sec" onclick="abrirProposta(\''+id+'\')">Voltar</button><button class="btn btn-primario" id="ms-ok">Salvar</button></div>');
  document.getElementById('ms-ok').onclick=()=>{ p.status=document.getElementById('ms').value; p.historico.push({data:ymd(hoje()),evento:'Status → '+ST_LABEL[p.status]}); salvar(); fecharModal(); render(); toast('Status atualizado'); };
}
function enviarCliente(id){
  const p=db.proposals.find(x=>x.id===id); if(!p) return;
  if(p.status==='RASCUNHO'){ p.status='ENVIADA'; p.historico.push({data:ymd(hoje()),evento:'Enviada ao cliente'}); }
  salvar();
  const cli=cliente(p.clienteId);
  abrirModal('<h3>Enviar ao cliente</h3><div class="desc">Mensagem pronta para o WhatsApp de '+esc(cli.nome)+'</div>'+
    '<div class="campo"><label>Mensagem</label><textarea rows="4" id="env-msg">Olá, '+esc(cli.nome)+'. Segue a proposta '+esc(p.numero)+' referente ao serviço de '+esc(p.servicoBase)+', com escopo, valores ('+brl(totalProposta(p))+'), prazo e condições. Qualquer dúvida, fico à disposição.</textarea></div>'+
    '<div class="campo"><label>Link da proposta</label><input value="orcafacil.app/p/'+esc(p.numero.toLowerCase())+'" readonly /></div>'+
    '<div class="modal-acoes"><button class="btn btn-sec" onclick="abrirProposta(\''+id+'\')">Voltar</button><button class="btn btn-zap" onclick="fecharModal();render();toast(\'Proposta enviada (simulado)\')">📤 Enviar no WhatsApp</button></div>');
}

/* página pública do cliente (simulada) */
function paginaCliente(id){
  const p=db.proposals.find(x=>x.id===id); if(!p) return;
  if(['ENVIADA'].includes(p.status)){ p.status='VISUALIZADA'; p.historico.push({data:ymd(hoje()),evento:'Visualizada pelo cliente'}); salvar(); }
  abrirModal(`<div class="no-print" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div><b style="font-size:13px;color:var(--tinta-suave)">PÁGINA DO CLIENTE (simulação)</b><div style="font-size:12px;color:var(--tinta-suave)">orcafacil.app/p/${esc(p.numero.toLowerCase())}</div></div>
      <button class="btn btn-fantasma" onclick="abrirProposta('${p.id}')">✕ Fechar</button>
    </div>`
    + htmlDocProposta(p,true)
    + `<div class="aprovar-bar no-print">
        <button class="btn btn-primario" style="background:#10b981" onclick="clienteResponde('${p.id}','APROVADA')">✓ Aprovar proposta</button>
        <button class="btn btn-sec" onclick="clienteResponde('${p.id}','NEGOCIACAO')">Solicitar ajuste</button>
        <button class="btn btn-perigo" onclick="clienteResponde('${p.id}','RECUSADA')">Recusar</button>
        <button class="btn btn-zap" onclick="toast('Abrindo WhatsApp do profissional…')">Falar no WhatsApp</button>
      </div>`, true);
}
function clienteResponde(id, status){
  const p=db.proposals.find(x=>x.id===id); if(!p) return;
  if(status==='APROVADA'){
    p.status='APROVADA';
    p.historico.push({data:ymd(hoje()),evento:'✅ APROVADA pelo cliente'});
    p.aceite={nome:cliente(p.clienteId).nome, data:ymd(hoje()), hora:agoraHora()};
    salvar();
    fecharModal(); render();
    toast('Cliente aprovou! 🎉');
    // alerta no chat
    db.chat.push({de:'bot', texto:'🎉 *'+cliente(p.clienteId).nome+' aprovou* a proposta '+p.numero+' ('+brl(totalProposta(p))+')!\nQuer transformar em *ordem de serviço*? Responda _"transformar em ordem de serviço"_.', hora:agoraHora()});
    salvar();
    setTimeout(()=>{ confirmarAcao('Proposta aprovada 🎉','Deseja converter '+p.numero+' em ordem de serviço agora?',()=>{ p.status='CONVERTIDA'; p.historico.push({data:ymd(hoje()),evento:'Convertida em ordem de serviço'}); salvar(); render(); toast('Convertida em ordem de serviço'); }); }, 400);
  } else {
    p.status=status; p.historico.push({data:ymd(hoje()),evento: status==='RECUSADA'?'Recusada pelo cliente':'Cliente solicitou ajuste'});
    salvar(); fecharModal(); render();
    toast(status==='RECUSADA'?'Cliente recusou':'Cliente pediu ajuste');
  }
}

/* ============================================================
   VIEW: CLIENTES
   ============================================================ */
function viewClientes(c){
  if(!db.clientes.length){ c.innerHTML='<div class="card vazio">Nenhum cliente ainda.</div>'; return; }
  let html=`<div class="card tabela-wrap"><table><thead><tr><th>Cliente</th><th>Telefone</th><th class="num">Propostas</th><th class="num">Total negociado</th><th class="num">Recebido</th><th></th></tr></thead><tbody>`;
  db.clientes.forEach(cl=>{
    const props=db.proposals.filter(p=>p.clienteId===cl.id);
    const tot=props.reduce((s,p)=>s+totalProposta(p),0);
    const rec=props.reduce((s,p)=>s+recebidoProposta(p),0);
    html+=`<tr class="clicavel" onclick="abrirCliente('${cl.id}')"><td><b>${esc(cl.nome)}</b>${cl.email?'<div style="font-size:12px;color:var(--tinta-suave)">'+esc(cl.email)+'</div>':''}</td><td>${esc(cl.telefone||'—')}</td><td class="num">${props.length}</td><td class="num">${brl(tot)}</td><td class="num">${brl(rec)}</td><td class="acoes-cel" onclick="event.stopPropagation()"><button class="btn btn-sec btn-sm" onclick="formCliente('${cl.id}')">Editar</button></td></tr>`;
  });
  html+='</tbody></table></div>';
  c.innerHTML=html;
}
function abrirCliente(id){
  const cl=cliente(id); const props=db.proposals.filter(p=>p.clienteId===id);
  let lin=props.map(p=>`<tr class="clicavel" onclick="fecharModal();abrirProposta('${p.id}')"><td>${esc(p.numero)}</td><td>${esc(p.servicoBase)}</td><td class="num">${brl(totalProposta(p))}</td><td>${stPill(proximoStatus(p))}</td></tr>`).join('');
  abrirModal(`<h3>${esc(cl.nome)}</h3><div class="desc">${esc(cl.telefone||'')} ${cl.email?'· '+esc(cl.email):''} ${cl.endereco?'· '+esc(cl.endereco):''}</div>
    <div class="secao-titulo" style="margin-top:6px">Histórico de propostas</div>
    <div class="tabela-wrap" style="border:1px solid var(--borda);border-radius:10px"><table><thead><tr><th>Nº</th><th>Serviço</th><th class="num">Total</th><th>Status</th></tr></thead><tbody>${lin||'<tr><td colspan=4 style="color:var(--tinta-suave)">Sem propostas</td></tr>'}</tbody></table></div>
    <div class="modal-acoes"><button class="btn btn-sec" onclick="formCliente('${id}')">Editar</button><button class="btn btn-primario" onclick="fecharModal()">Fechar</button></div>`);
}
function formCliente(id){
  const cl=id?cliente(id):{nome:'',telefone:'',email:'',endereco:'',obs:''};
  abrirModal(`<h3>${id?'Editar':'Novo'} cliente</h3><div class="desc">No uso normal, o cliente é criado sozinho a partir do orçamento.</div>
    <div class="campo"><label>Nome</label><input id="cl-nome" value="${esc(cl.nome)}"/></div>
    <div class="linha2"><div class="campo"><label>Telefone</label><input id="cl-tel" value="${esc(cl.telefone||'')}"/></div><div class="campo"><label>E-mail</label><input id="cl-email" value="${esc(cl.email||'')}"/></div></div>
    <div class="campo"><label>Endereço</label><input id="cl-end" value="${esc(cl.endereco||'')}"/></div>
    <div class="campo"><label>Observações</label><textarea id="cl-obs" rows="2">${esc(cl.obs||'')}</textarea></div>
    <div class="modal-acoes"><button class="btn btn-sec" onclick="fecharModal()">Cancelar</button><button class="btn btn-primario" id="cl-ok">Salvar</button></div>`);
  document.getElementById('cl-ok').onclick=()=>{
    const nome=document.getElementById('cl-nome').value.trim(); if(!nome) return toast('Informe o nome',true);
    const dados={nome, telefone:document.getElementById('cl-tel').value.trim(), email:document.getElementById('cl-email').value.trim(), endereco:document.getElementById('cl-end').value.trim(), obs:document.getElementById('cl-obs').value.trim()};
    if(id) Object.assign(cl,dados); else db.clientes.push(Object.assign({id:uid(),criadoEm:ymd(hoje())},dados));
    salvar(); fecharModal(); render(); toast(id?'Cliente atualizado':'Cliente criado');
  };
}

/* ============================================================
   VIEW: SERVIÇOS
   ============================================================ */
function viewServicos(c){
  if(!db.servicos.length){ c.innerHTML='<div class="card vazio">Nenhum serviço ainda.</div>'; return; }
  let html=`<div class="card tabela-wrap"><table><thead><tr><th>Serviço</th><th>Unidade</th><th class="num">Preço padrão</th><th class="num">Margem est.</th><th class="num">Histórico</th><th></th></tr></thead><tbody>`;
  db.servicos.forEach(s=>{
    const mg = s.precoPadrao? ((s.precoPadrao-(s.custoPadrao||0))/s.precoPadrao*100):0;
    html+=`<tr><td><b>${esc(s.nome)}</b>${s.garantiaPadrao?'<div style="font-size:12px;color:var(--tinta-suave)">Garantia: '+esc(s.garantiaPadrao)+'</div>':''}</td><td>${esc(s.unidade)}</td><td class="num">${brl(s.precoPadrao)}</td><td class="num">${mg.toFixed(0)}%</td><td class="num">${(s.historico||[]).length} preços</td><td class="acoes-cel"><button class="btn btn-sec btn-sm" onclick="formServico('${s.id}')">Editar</button></td></tr>`;
  });
  html+='</tbody></table></div><div class="dica" style="padding:14px 2px">O Orça Fácil aprende seus preços: cada orçamento alimenta o histórico e sugere o valor nas próximas propostas.</div>';
  c.innerHTML=html;
}
function formServico(id){
  const s=id?db.servicos.find(x=>x.id===id):{nome:'',unidade:'un',precoPadrao:'',custoPadrao:'',garantiaPadrao:''};
  abrirModal(`<h3>${id?'Editar':'Novo'} serviço</h3>
    <div class="campo"><label>Nome do serviço</label><input id="sv-nome" value="${esc(s.nome)}"/></div>
    <div class="linha2"><div class="campo"><label>Unidade</label><input id="sv-uni" value="${esc(s.unidade)}"/></div><div class="campo"><label>Preço padrão (R$)</label><input id="sv-preco" type="number" value="${s.precoPadrao||''}"/></div></div>
    <div class="linha2"><div class="campo"><label>Custo estimado (R$)</label><input id="sv-custo" type="number" value="${s.custoPadrao||''}"/></div><div class="campo"><label>Garantia padrão</label><input id="sv-gar" value="${esc(s.garantiaPadrao||'')}"/></div></div>
    <div class="modal-acoes"><button class="btn btn-sec" onclick="fecharModal()">Cancelar</button><button class="btn btn-primario" id="sv-ok">Salvar</button></div>`);
  document.getElementById('sv-ok').onclick=()=>{
    const nome=document.getElementById('sv-nome').value.trim(); if(!nome) return toast('Informe o nome',true);
    const dados={nome, unidade:document.getElementById('sv-uni').value.trim()||'un', precoPadrao:parseFloat(document.getElementById('sv-preco').value)||0, custoPadrao:parseFloat(document.getElementById('sv-custo').value)||0, garantiaPadrao:document.getElementById('sv-gar').value.trim()};
    if(id) Object.assign(s,dados); else db.servicos.push(Object.assign({id:uid(),historico:[dados.precoPadrao],criadoEm:ymd(hoje())},dados));
    salvar(); fecharModal(); render(); toast(id?'Serviço atualizado':'Serviço criado');
  };
}

/* ============================================================
   VIEW: PERFIL
   ============================================================ */
function viewPerfil(c){
  const pf=db.prof;
  const logoPrev = pf.logo ? `<img src="${pf.logo}"/>` : `<span>${esc(pf.logoTexto||'O')}</span>`;
  c.innerHTML=`<div class="card" style="padding:24px;max-width:640px">
    <div class="logo-up" style="margin-bottom:22px">
      <div class="logo-preview" id="logo-prev">${logoPrev}</div>
      <div>
        <label class="btn btn-sec" style="display:inline-flex">📤 Enviar logotipo<input type="file" accept="image/*" style="display:none" id="logo-file"/></label>
        ${pf.logo?'<button class="btn btn-fantasma" onclick="removerLogo()">Remover</button>':''}
        <div class="dica" style="padding:6px 0 0">Aparece no topo de todas as propostas.</div>
      </div>
    </div>
    <div class="campo"><label>Nome comercial / empresa</label><input id="pf-nome" value="${esc(pf.nome||'')}"/></div>
    <div class="linha2"><div class="campo"><label>Responsável</label><input id="pf-resp" value="${esc(pf.responsavel||'')}"/></div><div class="campo"><label>Telefone / WhatsApp</label><input id="pf-tel" value="${esc(pf.telefone||'')}"/></div></div>
    <div class="linha2"><div class="campo"><label>E-mail</label><input id="pf-email" value="${esc(pf.email||'')}"/></div><div class="campo"><label>CNPJ ou CPF (opcional)</label><input id="pf-doc" value="${esc(pf.documento||'')}"/></div></div>
    <div class="campo"><label>Endereço (opcional)</label><input id="pf-end" value="${esc(pf.endereco||'')}"/></div>
    <div class="linha2"><div class="campo"><label>Chave Pix (rodapé)</label><input id="pf-pix" value="${esc(pf.pix||'')}"/></div><div class="campo"><label>Validade padrão (dias)</label><input id="pf-val" type="number" value="${pf.validadePadrao||7}"/></div></div>
    <div class="campo"><label>Modelo visual da proposta</label><select id="pf-modelo">${['simples','profissional','moderno','tecnico','comercial'].map(m=>`<option ${pf.modelo===m?'selected':''}>${m}</option>`).join('')}</select></div>
    <div class="modal-acoes" style="justify-content:flex-start"><button class="btn btn-primario" id="pf-ok">Salvar perfil</button></div>
  </div>`;
  document.getElementById('logo-file').onchange=function(e){
    const f=e.target.files[0]; if(!f) return; const rd=new FileReader();
    rd.onload=()=>{ db.prof.logo=rd.result; salvar(); render(); toast('Logotipo atualizado'); }; rd.readAsDataURL(f);
  };
  document.getElementById('pf-ok').onclick=()=>{
    Object.assign(db.prof,{nome:val('pf-nome'),responsavel:val('pf-resp'),telefone:val('pf-tel'),email:val('pf-email'),documento:val('pf-doc'),endereco:val('pf-end'),pix:val('pf-pix'),validadePadrao:parseInt(val('pf-val'))||7,modelo:val('pf-modelo'),logoTexto:(val('pf-nome')||'O').trim().charAt(0).toUpperCase()});
    salvar(); render(); toast('Perfil salvo');
  };
}
function val(id){ return document.getElementById(id).value.trim(); }
function removerLogo(){ db.prof.logo=null; salvar(); render(); }

/* ============================================================
   INIT
   ============================================================ */
carregar();
document.querySelectorAll('.nav-item').forEach(b=>b.addEventListener('click',()=>irPara(b.dataset.v)));
render();
</script>
