# Blueprint do Render — cria SÓ o app (reaproveita um banco que você já tem).
# O plano gratuito do Render permite apenas 1 banco; por isso não criamos outro.
# Ao aplicar o blueprint, o Render vai PEDIR o valor de DATABASE_URL:
# cole ali a "Internal Database URL" do seu banco já existente.
# O Orça Fácil guarda seus dados num schema próprio ("orcafacil"),
# sem conflitar com outros projetos no mesmo banco.
services:
  - type: web
    name: orca-facil
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "22"
