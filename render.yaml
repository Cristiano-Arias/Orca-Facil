# Blueprint do Render — cria o app + o banco automaticamente.
# No Render: New > Blueprint > aponte para este repositório.
services:
  - type: web
    name: orca-facil
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run db:deploy && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: orca-facil-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "22"

databases:
  - name: orca-facil-db
    plan: free
